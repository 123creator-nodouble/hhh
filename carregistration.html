<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Seller Registration Page</title>
    <style>
       h1{
        color:rgba(112, 5, 5, 0.854);
        font-size: 30px;
        text-align:center;
    } 
      h2{
        color:brown;
        font-size: 20px;
        text-align:center;
      }
      form{
        border: 1px solid black;
        width:500px;
        padding: 20px;
        margin: 20px auto;
        text-align:center;
      }
      label{
        font-size: 15px;
        
      }
      input{
        margin: 10px;
        font-size:15px;

      }
      .box-container {
        position:fixed;
        top:0;
        left:0;
        width:100%;
        display:flex;
        padding:0 x;
        box-sizing:border-box;
        }
      .box_fixed{
        width: 25%;
        height: 50px;
        background-color: rgb(73, 6, 6);
        display: flex;
        justify-content: center;
        align-items: center;
        color:rgb(237, 237, 237);
        font-size:20px;
      }
      .box2{
        width:700px;
        height:1050px;
        background-color: rgb(255, 255, 255,0.8);
        position:absolute;
        margin:40px auto 0;
        z-index:-1;
        left:50%;
        transform:translate(-50%);
        
      }
      .box3{
        width:100%;
        height:150px;
        background-color: rgb(73,6, 6);
        position:absolute;
        z-index:-1;
        
      }
      body{
             background-image: url("car-background.jpg");
             background-size: cover;
             background-position: center;
             margin: 0;
        }

    </style>
    <script>
        function Username_True(){
            var username = document.getElementsByName("username")[0].value;
            if(username.length < 5){
                alert("The username must be more than five characters long.");  
            }
        }
        function Password_True(){
            var password = document.getElementsByName("password")[0].value;
            if(password.length < 8){
                alert("The password must be more than eight characters long.");  
            }
        }
        function Verification(){
            alert("Verification code sent to your contact information!");
        }
        function Register(){
            var verification = document.getElementsByName("verification code")[0].value;
            if(verification!="1234"){
                alert("Incorrect verification code. Please try again.");}
                else{ 
                    alert("Registration successful!");
                }
        }
    </script>
</head>
<body>
    
    <div class="box2"></div>
    <div class="box-container">
        <div class="box_fixed">HomePage</div>
        <div class="box_fixed">Login in</div>
        <div class="box_fixed">Add car</div>
        <div class="box_fixed">Registration</div>
    </div>
    <br><br>
    <h1>Car Seller Registration Page</h1>
    <form>
        <h2>Registration Information</h2>
        <label>Username:</label>
        <input type="text" name="username" placeholder="Your Username">
        <br>
        <label>Password:</label>
        <input type="password" name="password" placeholder="Your Password">
        <br>
        <label>Contact Information:</label>
        <input type="text" name="contact information" placeholder="Email or Phone Number">
        <br>
        <label>Verification Code:</label>
        <input type="text" name="verification code" placeholder="Enter Verification Code">
        <button type="button" onclick="Verification()" style="font-size:10px;">Send Verification Code</button>
        <br>
        <button type="submit" onclick="Username_True();Password_True();Register();" style="font-size:15px;">Register</button>
        <br>
        <a href="login.html" style="font-size:10px;">Already have an account?</a>
        <br><br><hr><br>
    </form>
    <form>
        <h2>Personal Information</h2>
        <label>Full Name:</label>
        <input type="text" name="full name" placeholder="Your Full Name">
        <br>
        <label>Address:</label>
        <input type="text" name="address" placeholder="Your Address">
        <br>
        <label>Phone:</label>
        <input type="text" name="phone" placeholder="Your Phone Number">
        <br>
        <label>ID Number:</label>
        <input type="password" name="id number" placeholder="ID Number">
        <br>
        <label>ID Photo:</label>
        <input type="file" name="id photo">
        <br>
        <label>Seller Type</label>
        <input type="radio" name="seller type" >Individual
        <input type="radio" name="seller type" >Dealer
        <br>
        <h2>Agreement</h2>
        <input type="checkbox" name="agreement"> I confirm all information is true.
        <br><br>
        <button type="submit" onclick="alert('Submit Successfully!');" style="font-size:25px;">Submit</button>
       
    </form>
    <div class="box3"></div>
</html>
