<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Car</title>
    <style>
        *{
            box-sizing:border-box;
        }
        body{
            font-family: Arial;
            margin: 20px;
        }
        h1 {
            text-align:center;
            margin: 30px 0;
        }
        form{
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .form-group{
            margin: 15px 0;
        }
        label{
            display: block;
            margin-bottom: 5px;
        }
        input,select{
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;

        }
        button{
            padding: 10px 20px;
            background: #0066cc;
            color:white;
            border:none;
            cursor:pointer;

        }

        @media (max-width:768px) {
            form{
                padding:15px;
            }
        }

    </style>
</head>
<body>
    <h1>Add New Car</h1>
<form id="carForm">
    <div class="form-group">
        <label>Color:</label>
        <input type="text" id="color" placeholder="Enter color" required>
    </div>
    <div class="form-group">
        <label>Model:</label>
        <input type="text" id="model" placeholder="Enter model" required>
    </div>
    <div class="form-group">
        <label>Year:</label>
        <input type="number" id="year" placeholder="Enter year" min="1900" max="2026" required>
    </div>
    <div class="form-group">
        <label>Location:</label>
        <input type="text" id="location" placeholder="Enter location" required>
    </div>
    <div class="form-group">
        <label>Price ($):</label>
        <input type="number" id="price" placeholder="Enter price" required>
    </div>
    <div class="form-group">
        <label>Car Image:</label>
        <input type="file" id="image" accept="image/*" required>
    </div>
    <button type="submit">Submit</button>
</form>

<script>
        document.getElementById('carForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                color: document.getElementById('color').value,
                model: document.getElementById('model').value,
                year: document.getElementById('year').value,
                location: document.getElementById('location').value,
                price: document.getElementById('price').value,
                image: document.getElementById('image').files[0] ? document.getElementById('image').files[0].name : "No image"
            };
            
            console.log("Car Information:", formData);
            alert("Car information submitted successfully!");
            
        
            this.reset();
        });
    </script>
</body>
</html>
